<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="64" height="64" fill-rule="evenodd">
  <defs>
    <!-- Astro Flame Path pointing UP -->
    <!-- The exact path is stored to be reused for the mask and the green layer -->
    <path id="flame-path" d="M 68,32 C 90,46 88,74 76,81 C 66,86 50,84 44,76 C 36,64 36,52 44,46 C 50,52 56,54 58,51 C 58,42 62,36 68,32 Z" />
    
    <mask id="gap-mask">
      <!-- Make the entire blue shield visible by default -->
      <rect width="100%" height="100%" fill="white" />
      <!-- Cut out the green flame shape, including a thick stroke to create the stencil gap -->
      <use href="#flame-path" fill="black" stroke="black" stroke-width="10" stroke-linejoin="round" stroke-linecap="round" />
    </mask>
  </defs>

  <!-- Blue Shield & 'O' -->
  <path d="M 32,18 L 96,18 L 115,58 L 64,115 L 13,58 Z M 64,60 A 24,24 0 1,0 64,108 A 24,24 0 1,0 64,60 Z" 
        fill="#2563eb" 
        stroke="#2563eb" 
        stroke-width="16" 
        stroke-linejoin="round" 
        mask="url(#gap-mask)" />

  <!-- Green Flame -->
  <use href="#flame-path" fill="#22c55e" />
</svg>
