name = "oredrok-portfolio"
pages_build_output_dir = "./dist"
compatibility_date = "2026-03-15"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

# Environment variables for email configuration
# Note: Email Workers binding must be configured in Cloudflare Pages dashboard
# Settings > Functions > Bindings > Add binding > Email Sending (name: EMAIL)
[vars]
FROM_EMAIL = "info@oredrok.dev"
RECIPIENT_EMAIL = "estcascor94@gmail.com"

# Uncomment below if you need session storage
# [[kv_namespaces]]
# binding = "SESSION"
# id = "your-kv-namespace-id-here"
